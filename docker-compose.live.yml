services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.live
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SSH_BUDDY_PROXY_ALLOWED_ORIGINS: "*"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    command:
      - --migrationsDir=/pb_migrations
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./backend/pocketbase/pb_migrations:/pb_migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pb_data:
